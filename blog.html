<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Batuhan D. — Blog">
  <title>Blog — Batuhan D.</title>
  <link rel="icon" type="image/png" href="media/yuvarlaklogobeyaz.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- intro overlay -->
  <div id="intro-overlay">
    <video id="intro-video" muted loop playsinline>
      <source src="media/intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- skip intro button -->
  <button id="skip-intro">[ SKIP ]</button>

  <!-- youtube background video -->
  <div id="bg-video-container" class="bg-video-container">
    <div id="bg-video-player"></div>
  </div>

  <!-- overlays -->
  <div class="grain-overlay"></div>
  <div class="scanline-overlay"></div>

  <!-- main site -->
  <div id="main-site">

    <!-- mobile nav toggle -->
    <button class="mobile-nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <!-- sidebar -->
    <nav class="sidebar-nav">
      <a href="index.html">
        <img src="media/yuvarlaklogobeyaz.png" alt="Logo" class="nav-logo">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="works.html">WORKS</a></li>
        <li><a href="blog.html" class="active">BLOG</a></li>
      </ul>
      <div class="sidebar-bottom">
        <button class="sidebar-toggle active" id="video-toggle">Video: On</button>
        <button class="sidebar-toggle" id="sound-toggle">Sound: Off</button>
      </div>
    </nav>

    <!-- corner barcode -->
    <img src="media/logobeyaz.png" alt="barcode" class="corner-barcode">

    <!-- copyright -->
    <div class="copyright" id="copyright"></div>

    <!-- content -->
    <div class="content-area">
      <section class="section section-blog" id="blog">
        <a href="index.html" class="back-link fade-in">← BACK</a>
        <div class="section-label fade-in">[ BLOG ]</div>
        <div id="blog-grid" class="blog-grid"></div>
      </section>
    </div>

    <!-- blog modal -->
    <div id="blog-modal" class="blog-modal">
      <div class="blog-modal-content">
        <button class="blog-modal-close">&times;</button>
        <div class="blog-modal-meta" id="blog-modal-meta"></div>
        <h2 class="blog-modal-title" id="blog-modal-title"></h2>
        <div class="blog-modal-body" id="blog-modal-body"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
  <script>
    document.getElementById('copyright').textContent = SITE_DATA.profile.copyright;
  </script>
</body>
</html>
